<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Generator Pesan WA Laboratorium</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f5f5;
      }

      .card {
        margin-top: 20px;
      }

      textarea {
        height: 650px;
        font-family: monospace;
      }

      h4 {
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card shadow">
        <div class="card-body">
          <h4>Generator Pesan WhatsApp Laboratorium PKS</h4>

          <div class="row">
            <!-- FORM -->
            <div class="col-md-6">
              <div class="mb-3">
                <label>Salam</label>
                <select id="salam" class="form-control">
                  <option>Pagi</option>
                  <option>Siang</option>
                  <option>Sore</option>
                  <option selected>Malam</option>
                </select>
              </div>

              <div class="mb-3">
                <label>Tanggal</label>
                <input
                  type="text"
                  id="tanggal"
                  class="form-control"
                  placeholder="13 Juli 2026"
                />
              </div>

              <div class="mb-3">
                <label>Jam</label>
                <input
                  type="text"
                  id="jam"
                  class="form-control"
                  placeholder="19.00"
                />
              </div>

              <hr />

              <h5>Fibre Press</h5>

              <div class="row">
                <div class="col-6">
                  <input
                    id="fp1"
                    class="form-control mb-2"
                    placeholder="No.1"
                  />
                </div>
                <div class="col-6">
                  <input
                    id="fp2"
                    class="form-control mb-2"
                    placeholder="No.2"
                  />
                </div>

                <div class="col-6">
                  <input
                    id="fp3"
                    class="form-control mb-2"
                    placeholder="No.3"
                  />
                </div>
                <div class="col-6">
                  <input
                    id="fp4"
                    class="form-control mb-2"
                    placeholder="No.4"
                  />
                </div>

                <div class="col-6">
                  <input
                    id="fp5"
                    class="form-control mb-2"
                    placeholder="No.5"
                  />
                </div>
                <div class="col-6">
                  <input
                    id="fp6"
                    class="form-control mb-2"
                    placeholder="No.6"
                  />
                </div>
              </div>

              <hr />

              <h5>Bunch Press</h5>

              <input id="bp1" class="form-control mb-2" placeholder="No.1" />
              <input id="bp2" class="form-control mb-2" placeholder="No.2" />
              <input id="bp3" class="form-control mb-2" placeholder="No.3" />
              <input id="bp4" class="form-control mb-2" placeholder="No.4" />

              <hr />

              <input
                id="allhp"
                class="form-control mb-2"
                placeholder="All HP"
              />

              <input
                id="finalfe"
                class="form-control mb-2"
                placeholder="Final FE"
              />

              <hr />

              <h5>Komposisi COT</h5>

              <input id="oil" class="form-control mb-2" placeholder="Oil" />
              <input
                id="emulsi"
                class="form-control mb-2"
                placeholder="Emulsi"
              />
              <input id="moist" class="form-control mb-2" placeholder="Moist" />
              <input
                id="sludge"
                class="form-control mb-2"
                placeholder="Sludge"
              />
              <input id="ffa" class="form-control mb-2" placeholder="FFA" />

              <hr />

              <h5>CPO Produksi V1</h5>

              <input id="v1ffa" class="form-control mb-2" placeholder="FFA" />
              <input
                id="v1moist"
                class="form-control mb-2"
                placeholder="Moist"
              />
              <input id="v1dobi" class="form-control mb-2" placeholder="DOBI" />

              <hr />

              <h5>CPO Produksi V2</h5>

              <input id="v2ffa" class="form-control mb-2" placeholder="FFA" />
              <input
                id="v2moist"
                class="form-control mb-2"
                placeholder="Moist"
              />
              <input id="v2dobi" class="form-control mb-2" placeholder="DOBI" />

              <br />

              <button class="btn btn-success" onclick="buatPesan()">
                Generate
              </button>

              <button class="btn btn-primary" onclick="salin()">Salin</button>

              <button class="btn btn-success" onclick="wa()">WhatsApp</button>
            </div>

            <!-- HASIL -->
            <div class="col-md-6">
              <textarea id="hasil" class="form-control"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function v(id) {
        return document.getElementById(id).value;
      }

      function buatPesan() {
        let pesan = `Selamat ${v("salam")}

Berikut monitoring mutu & Losis PKS
${v("tanggal")}

Sample / 2 jam
Pukul ${v("jam")} WITA

1. Fibre Press (Std <4 %)
No.1 : ${v("fp1")} %
No.2 : ${v("fp2")} %
No.3 : ${v("fp3")} %
No.4 : ${v("fp4")} %
No.5 : ${v("fp5")} %
No.6 : ${v("fp6")} %

2. Bunch Press (Std <1.5 %)
No.1 : ${v("bp1")} %
No.2 : ${v("bp2")} %
No.3 : ${v("bp3")} %
No.4 : ${v("bp4")} %

3. All HP : ${v("allhp")} %

4. Final FE : ${v("finalfe")} % (Std <0.8 %)

5. Komposisi COT
Oil : ${v("oil")} %
Emulsi : ${v("emulsi")} %
Moist : ${v("moist")} %
Sludge : ${v("sludge")} %
FFA : ${v("ffa")} %

6. CPO Produksi V1
FFA : ${v("v1ffa")} % (Std <5%)
Moist : ${v("v1moist")} % (Std <0.150%)
DOBI : ${v("v1dobi")} % (Std >2%)

7. CPO Produksi V2
FFA : ${v("v2ffa")} % (Std <5%)
Moist : ${v("v2moist")} % (Std <0.150%)
DOBI : ${v("v2dobi")} (Std >2%)


Terima kasih.`;

        document.getElementById("hasil").value = pesan;
      }

      function salin() {
        navigator.clipboard.writeText(document.getElementById("hasil").value);

        alert("Pesan berhasil disalin");
      }

      function wa() {
        let text = encodeURIComponent(document.getElementById("hasil").value);

        window.open("https://wa.me/?text=" + text);
      }
    </script>
  </body>
</html>
